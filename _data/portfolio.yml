- name: Exploring machine learning approaches to improve scheduler performance
  image: /assets/images/ericsson.jpg
  description: The thesis project consists of two parts. First part is an extensive literature study in the research area of machine learning in scheduling and writing the report that summarizes research in this area. Second part is to explore how machine learning can be used to predict waiting time and service time for jobs in internal scheduling system and writing the report. The second part comprises extracting data from database, cleaning data, analyzing correlations between features and waiting time, extracting useful features and creating new features, predicting waiting time using machine learning methods. 
