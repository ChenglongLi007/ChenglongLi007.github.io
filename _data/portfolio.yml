  image: /assets/images/inspur.png
  description: Worked as an intern engineer for product research & development team. Worked on summarizing the second version of ”AND Credit” and valuated the feasibility of encapsulation of its functions. Visualized the original credit score calculating process and demonstrated in a pipeline. Reconstructed and replaced some subroutines of the procedure of ”AND Credit” in order to make it a pipeline process on Data Science Platform of Inspur.
- name: Data driven model for truck behavior
  image: /assets/images/skogforsk.jpg
  description: The project aims at predicting the behavior of the truck driver in order to becoming a sub-program to predict the fuel consumption for Skogforsk. I worked on analyzing the correlations of features and building recurrent neural network including parameters tuning to find out a better model.