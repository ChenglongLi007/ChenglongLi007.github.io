- name: Exploring machine learning approaches to improve scheduler performance
  image: /assets/images/ericsson.jpg
  description: The thesis project consists of two parts. The first part is an extensive literature study in the research area of machine learning in scheduling and writing the report that summarizes research in this area. The second part is to explore how machine learning can be used to predict waiting time for jobs in internal scheduling system and writing the report. The second part comprises extracting data from database, cleaning data, analyzing correlations between features and waiting time, extracting useful features and creating new features, predicting waiting time using machine learning methods. 
- name:
  image: /assets/images/inspur.png
  description: Made a summary of the procedure of the second “AND Credit” Model and evaluated the feasibility to make it a machine learning pipeline. The “AND Credit” Model, which is like the Credit Card Scoring Model for banks, is used by China Mobile to get customer credit ratings. Read papers in the field of obtaining customer credit ratings using machine learning methods. Analyzed and reconstructed some subroutines to make it possible to be a machine learning pipeline on the Data Science Platform of Inspur. My approach to select features proved to be effective. Gave a presentation to my colleges and manager and shared my ideas with them. 
- name: Data driven model for truck behavior
  image: /assets/images/skogforsk.jpg
  description: This project is a part of the program to predict the truck fuel consumption of Skogforsk and the goal of it is to predict the speed of truck at some positions on its course. Discussed with the experts from Skogforsk about some solutions and made a presentation to them. Responsible for the data analysis section and spotted several features correlating significantly with the speed of the truck. Worked on building supervised models to predict the speed of a truck as well. 
